<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz · Internet & HTML</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f4f7fc; color: #0b1a2f; padding-top: 70px; }
    body.dark { background: #0b1a2f; color: #e8edf5; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    .navbar {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px; z-index: 999;
      border-bottom: 1px solid rgba(0,0,0,0.03);
    }
    body.dark .navbar { background: rgba(11,26,47,0.9); border-bottom: 1px solid #2a3a55; }
    .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: none; padding: 8px 14px; border-radius: 40px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; color: #1a314e;
      display: inline-flex; align-items: center; gap: 6px;
    }
    body.dark .nav-btn { color: #cbd5e1; }
    .nav-btn:hover { background: rgba(0,80,200,0.08); }
    .nav-btn.active { background: #0a58ca; color: white !important; }
    .theme-toggle {
      background: #eef2f6; border: none; width: 40px; height: 40px;
      border-radius: 40px; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    body.dark .theme-toggle { background: #253b5a; color: #f0c94b; }

    .card {
      background: rgba(255,255,255,0.7); backdrop-filter: blur(4px);
      border-radius: 28px; padding: 28px 30px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }
    body.dark .card { background: rgba(22,40,62,0.7); border-color: #2a405a; }

    .quiz-option {
      display: block; padding: 14px 20px; margin: 10px 0;
      background: #f0f5fd; border-radius: 60px;
      border: 1px solid #d0dbe9; cursor: pointer;
      transition: 0.15s;
    }
    body.dark .quiz-option { background: #1b3352; border-color: #34517a; }
    .quiz-option:hover { background: #dce8fa; }
    body.dark .quiz-option:hover { background: #2d4b74; }
    .quiz-option.selected { background: #0a58ca; color: white; border-color: #0a58ca; }
    .timer-box { font-size: 1.8rem; font-weight: 700; color: #0a58ca; }

    .btn-primary {
      background: #0a58ca; color: white; padding: 10px 28px;
      border-radius: 60px; border: none; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { background: #084298; }

    .btn-secondary {
      background: #eef2f8; padding: 8px 20px; border-radius: 60px;
      border: 1px solid #d0dbe9; font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px;
    }
    body.dark .btn-secondary { background: #1f3653; border-color: #34517a; color: #cbd5e1; }

    .footer { margin-top: 40px; padding: 24px 0; border-top: 1px solid #dce3ed; text-align: center; font-size: 0.9rem; }
    body.dark .footer { border-top-color: #27405e; }

    .result-certificate {
      border: 4px double #b89b6b; padding: 30px 20px;
      border-radius: 40px; background: #fefaf0;
      text-align: center; max-width: 480px; margin: 0 auto;
    }
    body.dark .result-certificate { background: #1f334f; border-color: #b89b6b; }

    @media (max-width:720px){ .navbar { flex-wrap: wrap; height: auto; padding: 8px 12px; } .nav-btn { font-size:0.7rem; padding:4px 10px; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <span style="font-weight:800; font-size:1.2rem;">🌐 Learn</span>
    <div class="nav-links">
      <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
      <a href="mindmap.html" class="nav-btn"><i class="fas fa-sitemap"></i> MindMap</a>
      <a href="protocols.html" class="nav-btn"><i class="fas fa-network-wired"></i> Protocols</a>
      <a href="flow.html" class="nav-btn"><i class="fas fa-arrow-right-arrow-left"></i> Flow</a>
      <a href="html-intro.html" class="nav-btn"><i class="fas fa-code"></i> HTML</a>
      <a href="tags.html" class="nav-btn"><i class="fas fa-table"></i> Tags</a>
      <a href="playground.html" class="nav-btn"><i class="fas fa-pen"></i> Play</a>
      <a href="quiz.html" class="nav-btn active"><i class="fas fa-question-circle"></i> Quiz</a>
      <a href="results.html" class="nav-btn"><i class="fas fa-chart-simple"></i> Results</a>
    </div>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </nav>

  <div class="container" style="margin-top:12px;">
    <div class="card">
      <h2><i class="fas fa-question-circle"></i> Quiz Challenge</h2>
      <div id="quizSetup">
        <label>Your name: <input type="text" id="quizUserName" placeholder="Enter name" value="Alex Rivera" style="padding:10px 16px; border-radius:40px; border:1px solid #d0dbe9;"></label>
        <button class="btn-primary" id="startQuizBtn"><i class="fas fa-play"></i> Start Quiz</button>
      </div>
      <div id="quizArea" style="display:none;">
        <div style="display:flex; justify-content:space-between;"><span>Question <span id="qNum">1</span>/10</span><span class="timer-box" id="timerDisplay">02:00</span></div>
        <h3 id="qText">Loading...</h3>
        <div id="qOptions"></div>
        <button class="btn-primary" id="nextQBtn" style="margin-top:12px;">Next <i class="fas fa-arrow-right"></i></button>
      </div>
      <div id="quizResult" style="display:none; margin-top:20px;"></div>
    </div>
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <a href="playground.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Playground</a>
      <a href="results.html" class="btn-secondary">Next: Results <i class="fas fa-arrow-right"></i></a>
    </div>
  </div>

  <footer class="footer container">
    <p>Made with <i class="fas fa-heart" style="color:#e74c3c;"></i> HTML, CSS, JavaScript and Curiosity.</p>
    <p style="opacity:0.7; font-size:0.9rem;">© 2026 - Present Bhuvanesh M · <span id="footerStudent">Alex Rivera</span></p>
  </footer>

  <script>
    // theme
    const toggle = document.getElementById('themeToggle');
    const body = document.body;
    toggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      toggle.innerHTML = body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') { body.classList.add('dark'); toggle.innerHTML = '<i class="fas fa-sun"></i>'; }
    document.getElementById('footerStudent').textContent = localStorage.getItem('studentName') || 'Alex Rivera';

    // QUIZ ENGINE
    const quizData = [
      { q: 'What does IP stand for?', opts: ['Internet Protocol','Internal Program','Integrated Process','Interchange Protocol'], ans: 0 },
      { q: 'Which protocol is used for web browsing?', opts: ['FTP','HTTP','SMTP','DNS'], ans: 1 },
      { q: 'What is the default port for HTTPS?', opts: ['80','443','21','25'], ans: 1 },
      { q: 'Which protocol is connectionless?', opts: ['TCP','UDP','HTTP','FTP'], ans: 1 },
      { q: 'What does DNS do?', opts: ['Translates domain to IP','Sends email','Transfers files','Encrypts data'], ans: 0 },
      { q: 'Which HTML tag is used for hyperlinks?', opts: ['<link>','<a>','<href>','<url>'], ans: 1 },
      { q: 'What is the correct HTML element for the largest heading?', opts: ['<head>','<h6>','<h1>','<heading>'], ans: 2 },
      { q: 'Which attribute specifies an image source?', opts: ['src','href','alt','link'], ans: 0 },
      { q: 'What does SMTP handle?', opts: ['File transfer','Email sending','Web browsing','Name resolution'], ans: 1 },
      { q: 'Which protocol is used for secure communication?', opts: ['HTTP','FTP','HTTPS','SMTP'], ans: 2 }
    ];

    let quizState = { started: false, current: 0, score: 0, selected: -1, timer: null, timeLeft: 120, userName: '' };
    let shuffledQuiz = [];

    function shuffleArray(arr) { for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    const startBtn = document.getElementById('startQuizBtn');
    const quizSetupDiv = document.getElementById('quizSetup');
    const quizArea = document.getElementById('quizArea');
    const quizResultDiv = document.getElementById('quizResult');
    const qNum = document.getElementById('qNum');
    const qText = document.getElementById('qText');
    const qOptions = document.getElementById('qOptions');
    const nextBtn = document.getElementById('nextQBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const quizUserName = document.getElementById('quizUserName');

    function startQuiz() {
      const name = quizUserName.value.trim() || 'Student';
      quizState.userName = name;
      localStorage.setItem('studentName', name);
      document.getElementById('footerStudent').textContent = name;
      shuffledQuiz = shuffleArray([...quizData]);
      quizState.current = 0; quizState.score = 0; quizState.timeLeft = 120;
      quizState.started = true;
      quizSetupDiv.style.display = 'none';
      quizArea.style.display = 'block';
      quizResultDiv.style.display = 'none';
      renderQuestion();
      startTimer();
    }

    function renderQuestion() {
      if (quizState.current >= shuffledQuiz.length) { finishQuiz(); return; }
      const q = shuffledQuiz[quizState.current];
      qNum.textContent = quizState.current + 1;
      qText.textContent = q.q;
      qOptions.innerHTML = '';
      q.opts.forEach((opt, idx) => {
        const div = document.createElement('div');
        div.className = 'quiz-option';
        div.textContent = opt;
        div.dataset.idx = idx;
        div.addEventListener('click', () => selectOption(idx));
        qOptions.appendChild(div);
      });
      quizState.selected = -1;
      nextBtn.textContent = quizState.current === shuffledQuiz.length - 1 ? 'Finish' : 'Next →';
    }

    function selectOption(idx) {
      if (quizState.selected !== -1) return;
      quizState.selected = idx;
      const options = qOptions.querySelectorAll('.quiz-option');
      options.forEach((el, i) => { if (i === idx) el.classList.add('selected'); });
      if (idx === shuffledQuiz[quizState.current].ans) quizState.score++;
    }

    function nextQuestion() {
      if (quizState.selected === -1) { alert('Please select an option.'); return; }
      quizState.current++;
      if (quizState.current < shuffledQuiz.length) renderQuestion();
      else finishQuiz();
    }

    function finishQuiz() {
      clearInterval(quizState.timer);
      quizArea.style.display = 'none';
      quizResultDiv.style.display = 'block';
      const total = shuffledQuiz.length;
      const score = quizState.score;
      const pct = Math.round((score/total)*100);
      const pass = pct >= 60;
      const name = quizState.userName;
      let msg = pass ? '🎉 Excellent! You passed!' : '📚 Keep learning. You can retry!';
      if (pct >= 90) msg = '🌟 Outstanding! Mastery level!';
      else if (pct >= 70) msg = '💪 Good job! You know your stuff.';
      
      // Save to localStorage for results page
      localStorage.setItem('lastQuiz', JSON.stringify({ name, score, total, pct }));
      
      // Save to leaderboard
      let board = JSON.parse(localStorage.getItem('leaderboard') || '[]');
      board.push({ name, score, total, pct, date: new Date().toLocaleDateString() });
      board.sort((a,b) => b.pct - a.pct);
      if (board.length > 20) board = board.slice(0,20);
      localStorage.setItem('leaderboard', JSON.stringify(board));

      quizResultDiv.innerHTML = `
        <div class="result-certificate">
          <h2>🏆 Quiz Results</h2>
          <p><strong>${name}</strong></p>
          <p style="font-size:2rem;">${score}/${total}</p>
          <p>${pct}% – ${pass ? '✅ Pass' : '❌ Retry'}</p>
          <p>${msg}</p>
          <button class="btn-primary" id="retakeQuizBtn"><i class="fas fa-rotate"></i> Retake Quiz</button>
          <br><br>
          <a href="results.html" class="btn-primary" style="background:#0d6efd;">View Results Dashboard</a>
        </div>
      `;
      document.getElementById('retakeQuizBtn')?.addEventListener('click', () => {
        quizSetupDiv.style.display = 'block';
        quizArea.style.display = 'none';
        quizResultDiv.style.display = 'none';
        quizState.started = false;
      });
      if (pct >= 80) launchConfetti();
    }

    function startTimer() {
      clearInterval(quizState.timer);
      quizState.timeLeft = 120;
      timerDisplay.textContent = '02:00';
      quizState.timer = setInterval(() => {
        quizState.timeLeft--;
        const m = String(Math.floor(quizState.timeLeft/60)).padStart(2,'0');
        const s = String(quizState.timeLeft%60).padStart(2,'0');
        timerDisplay.textContent = `${m}:${s}`;
        if (quizState.timeLeft <= 0) { clearInterval(quizState.timer); alert('Time is up!'); finishQuiz(); }
      }, 1000);
    }

    startBtn.addEventListener('click', startQuiz);
    nextBtn.addEventListener('click', nextQuestion);

    function launchConfetti() {
      const colors = ['#f44336','#e91e63','#9c27b0','#3f51b5','#4caf50','#ffeb3b','#ff9800'];
      for (let i=0; i<60; i++) {
        const el = document.createElement('div');
        el.style.cssText = `position:fixed; width:10px; height:10px; background:${colors[Math.floor(Math.random()*colors.length)]}; left:${Math.random()*100}vw; top:-10px; border-radius:50%; pointer-events:none; z-index:9999; transition: all 2.5s ease-out;`;
        document.body.appendChild(el);
        requestAnimationFrame(() => {
          el.style.transform = `translateY(${window.innerHeight+100}px) rotate(${Math.random()*360}deg)`;
          el.style.opacity = '0';
        });
        setTimeout(() => el.remove(), 3000);
      }
    }
  </script>
</body>
</html>
