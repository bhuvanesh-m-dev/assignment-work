<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results · Internet & HTML</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f4f7fc; color: #0b1a2f; padding-top: 70px; }
    body.dark { background: #0b1a2f; color: #e8edf5; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

    .navbar {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px; z-index: 999;
      border-bottom: 1px solid rgba(0,0,0,0.03);
    }
    body.dark .navbar { background: rgba(11,26,47,0.9); border-bottom: 1px solid #2a3a55; }
    .nav-links { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .nav-btn {
      background: transparent; border: none; padding: 8px 14px; border-radius: 40px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; color: #1a314e;
      display: inline-flex; align-items: center; gap: 6px;
    }
    body.dark .nav-btn { color: #cbd5e1; }
    .nav-btn:hover { background: rgba(0,80,200,0.08); }
    .nav-btn.active { background: #0a58ca; color: white !important; }
    .theme-toggle {
      background: #eef2f6; border: none; width: 40px; height: 40px;
      border-radius: 40px; font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    body.dark .theme-toggle { background: #253b5a; color: #f0c94b; }

    .card {
      background: rgba(255,255,255,0.7); backdrop-filter: blur(4px);
      border-radius: 28px; padding: 28px 30px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }
    body.dark .card { background: rgba(22,40,62,0.7); border-color: #2a405a; }

    .leaderboard-entry {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #dce3ed;
    }
    body.dark .leaderboard-entry { border-bottom-color: #2a405a; }

    .share-btn {
      padding: 10px 22px; border-radius: 60px; border: none;
      font-weight: 600; color: white;
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; transition: 0.2s;
    }
    .share-btn.whatsapp { background: #25D366; }
    .share-btn.linkedin { background: #0A66C2; }
    .share-btn.twitter { background: #000; }
    .share-btn.copy { background: #4a6a8b; }
    .share-btn.download { background: #1f3a5e; }
    .share-btn:hover { transform: scale(0.97); opacity: 0.9; }

    .btn-secondary {
      background: #eef2f8; padding: 8px 20px; border-radius: 60px;
      border: 1px solid #d0dbe9; font-weight: 600;
      display: inline-flex; align-items: center; gap: 8px;
    }
    body.dark .btn-secondary { background: #1f3653; border-color: #34517a; color: #cbd5e1; }

    .footer { margin-top: 40px; padding: 24px 0; border-top: 1px solid #dce3ed; text-align: center; font-size: 0.9rem; }
    body.dark .footer { border-top-color: #27405e; }

    @media (max-width:720px){ .navbar { flex-wrap: wrap; height: auto; padding: 8px 12px; } .nav-btn { font-size:0.7rem; padding:4px 10px; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <span style="font-weight:800; font-size:1.2rem;">🌐 Learn</span>
    <div class="nav-links">
      <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
      <a href="mindmap.html" class="nav-btn"><i class="fas fa-sitemap"></i> MindMap</a>
      <a href="protocols.html" class="nav-btn"><i class="fas fa-network-wired"></i> Protocols</a>
      <a href="flow.html" class="nav-btn"><i class="fas fa-arrow-right-arrow-left"></i> Flow</a>
      <a href="html-intro.html" class="nav-btn"><i class="fas fa-code"></i> HTML</a>
      <a href="tags.html" class="nav-btn"><i class="fas fa-table"></i> Tags</a>
      <a href="playground.html" class="nav-btn"><i class="fas fa-pen"></i> Play</a>
      <a href="quiz.html" class="nav-btn"><i class="fas fa-question-circle"></i> Quiz</a>
      <a href="results.html" class="nav-btn active"><i class="fas fa-chart-simple"></i> Results</a>
    </div>
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
  </nav>

  <div class="container" style="margin-top:12px;">
    <div class="card">
      <h2><i class="fas fa-chart-simple"></i> Results Dashboard</h2>
      <div id="resultsContent"><p>Complete the quiz to see your results here.</p></div>
    </div>
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;">
      <a href="quiz.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Quiz</a>
      <a href="index.html" class="btn-secondary"><i class="fas fa-home"></i> Home</a>
    </div>
  </div>

  <footer class="footer container">
    <p>Made with <i class="fas fa-heart" style="color:#e74c3c;"></i> HTML, CSS, JavaScript and Curiosity.</p>
    <p style="opacity:0.7; font-size:0.9rem;">© 2026 - Present Bhuvanesh M · <span id="footerStudent">Alex Rivera</span></p>
  </footer>

  <script>
    // theme
    const toggle = document.getElementById('themeToggle');
    const body = document.body;
    toggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      toggle.innerHTML = body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
      localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('theme') === 'dark') { body.classList.add('dark'); toggle.innerHTML = '<i class="fas fa-sun"></i>'; }
    document.getElementById('footerStudent').textContent = localStorage.getItem('studentName') || 'Alex Rivera';

    const resultsContent = document.getElementById('resultsContent');
    const SITE_URL = 'http://bhuvanesh-m-dev.github.io/assignment-work/web-technologies';

    function renderResults() {
      const lastQuiz = JSON.parse(localStorage.getItem('lastQuiz') || 'null');
      const board = JSON.parse(localStorage.getItem('leaderboard') || '[]');
      if (!lastQuiz && board.length === 0) {
        resultsContent.innerHTML = '<p>Complete the quiz to see your results here.</p>';
        return;
      }
      let html = '';
      if (lastQuiz) {
        const { name, score, total, pct } = lastQuiz;
        html += `<div style="display:flex; flex-wrap:wrap; gap:24px;">
          <div class="card" style="flex:1;"><h3>${name}</h3><p>Score: ${score}/${total}</p><p>Percentage: ${pct}%</p><p>${pct>=70 ? '✅ Pass' : '📖 Keep going'}</p></div>
          <div class="card" style="flex:2;"><h4><i class="fas fa-trophy"></i> Leaderboard</h4><div id="leaderboardList"></div></div>
        </div>
        <div style="margin:16px 0; padding:12px; background:#eef2f8; border-radius:16px; text-align:center;">
          <p style="font-size:0.9rem; opacity:0.7;">🌐 Hosted at: <a href="${SITE_URL}" target="_blank" style="color:#0a58ca; text-decoration:underline;">${SITE_URL}</a></p>
        </div>
        <div class="share-btns" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin:20px 0;">
          <button class="share-btn whatsapp" id="shareWA"><i class="fab fa-whatsapp"></i> WhatsApp</button>
          <button class="share-btn linkedin" id="shareLI"><i class="fab fa-linkedin"></i> LinkedIn</button>
          <button class="share-btn twitter" id="shareX"><i class="fab fa-x-twitter"></i> X</button>
          <button class="share-btn copy" id="shareCopy"><i class="fas fa-copy"></i> Copy</button>
          <button class="share-btn download" id="downloadResult"><i class="fas fa-download"></i> Download PNG</button>
        </div>`;
      }
      resultsContent.innerHTML = html;

      // leaderboard
      const list = document.getElementById('leaderboardList');
      if (list) {
        list.innerHTML = board.slice(0,10).map((e,i) => `
          <div class="leaderboard-entry"><span>${i+1}. ${e.name}</span><span>${e.pct}% (${e.score}/${e.total})</span></div>
        `).join('');
      }

      // share handlers
      if (lastQuiz) {
        const { name, score, total, pct } = lastQuiz;
        const shareText = `🌐 Internet Protocols & HTML Quiz\n${name} scored ${score}/${total} (${pct}%)! 🎯\nKeep learning! #DigitalLearning\n\nTake the quiz: ${SITE_URL}`;
        document.getElementById('shareWA')?.addEventListener('click', ()=> window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`,'_blank'));
        document.getElementById('shareLI')?.addEventListener('click', ()=> window.open(`https://linkedin.com/sharing/share-offscreen/?url=${encodeURIComponent(SITE_URL)}&summary=${encodeURIComponent(shareText)}`,'_blank'));
        document.getElementById('shareX')?.addEventListener('click', ()=> window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`,'_blank'));
        document.getElementById('shareCopy')?.addEventListener('click', ()=> { navigator.clipboard.writeText(shareText); alert('Copied!'); });
        document.getElementById('downloadResult')?.addEventListener('click', ()=> downloadResultCard(name, score, total, pct));
      }
    }

    function downloadResultCard(name, score, total, pct) {
      const canvas = document.createElement('canvas');
      canvas.width = 900; canvas.height = 600;
      const ctx = canvas.getContext('2d');
      
      // Background
      const gradient = ctx.createLinearGradient(0, 0, 900, 600);
      gradient.addColorStop(0, '#fefaf0');
      gradient.addColorStop(1, '#f0f4ff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 900, 600);
      
      // Border
      ctx.strokeStyle = '#b89b6b';
      ctx.lineWidth = 6;
      ctx.strokeRect(20, 20, 860, 560);
      
      ctx.fillStyle = '#0b1a2f';
      ctx.font = 'bold 52px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('🏆 Certificate of Achievement', 450, 100);
      
      ctx.font = '30px Segoe UI';
      ctx.fillText(`Awarded to: ${name}`, 450, 180);
      
      ctx.font = '26px Segoe UI';
      ctx.fillText(`Score: ${score}/${total}  (${pct}%)`, 450, 260);
      
      ctx.fillStyle = pct>=70 ? '#0a58ca' : '#b24a4a';
      ctx.font = '28px Segoe UI';
      ctx.fillText(pct>=70 ? '✅ Passed' : '📖 Keep learning', 450, 330);
      
      ctx.fillStyle = '#4a6a8b';
      ctx.font = '18px Segoe UI';
      ctx.fillText('Digital Learning Companion', 450, 400);
      
      ctx.font = '16px Segoe UI';
      ctx.fillStyle = '#6b89b0';
      ctx.fillText(`🌐 ${SITE_URL}`, 450, 460);
      
      ctx.font = '16px Segoe UI';
      ctx.fillStyle = '#8a9bb0';
      ctx.fillText('© 2026 Bhuvanesh M', 450, 520);
      
      const link = document.createElement('a');
      link.download = 'certificate.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    renderResults();
  </script>
</body>
</html>
